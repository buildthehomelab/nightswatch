services:
  app:
    build:
      context: .
      target: runtime
      args:
        - TRUENAS_HOST
        - TRUENAS_PORT
        - TRUENAS_UI_URL
        - TRUENAS_STOPPED_APP_HIDE_MINUTES
        - TRUENAS_POOL_WARN_PCT
        - TRUENAS_POOL_CRIT_PCT
        - TRUENAS_DISK_WARN_C
        - TRUENAS_DISK_CRIT_C
        - DOZZLE_URL
        - WEATHER_LOCATION
        - CVE_KEYWORDS
        - DEMO
    image: nightswatch:latest
    environment:
      - TRUENAS_HOST
      - TRUENAS_PORT
      - TRUENAS_KEY
    ports:
      - "${PORT:-8080}:80"
    restart: unless-stopped
