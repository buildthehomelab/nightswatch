services:
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    env_file:
      - .env.local
    environment:
      BROWSER: none
      DOCKER_SOCKET: /var/run/docker.sock
