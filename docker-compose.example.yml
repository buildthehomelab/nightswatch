# Nightswatch: pre-built image from GHCR. No cloning or building required.
# Copy this file, fill in your values, and run: docker compose -f docker-compose.example.yml up -d

services:
  nightswatch:
    image: ghcr.io/buildthehomelab/nightswatch:latest
    environment:
      # ── Required ────────────────────────────────────────────────────────────
      TRUENAS_HOST: your-nas-hostname-or-ip
      TRUENAS_PORT: 443
      TRUENAS_KEY: your-truenas-api-key

      # ── Optional ────────────────────────────────────────────────────────────
      # TRUENAS_UI_URL: https://nas.local     # browser-facing URL (split DNS)
      # DOZZLE_URL: https://dozzle.local      # Dozzle log viewer URL
      # WEATHER_LOCATION: London              # city or "lat,lon"
      # CVE_KEYWORDS: plex,nginx,proxmox      # comma-separated NVD search terms
      # CVE_MIN_CVSS: 4.0                     # minimum CVSS score (default 4.0)
      # DEMO: "true"                          # mock data, no TrueNAS needed
      # ENABLE_DOCKER: "false"              # set to "false" to suppress Docker monitoring even if socket is mounted
      # DOCKER_UI_URL: https://portainer.local  # browser-facing Docker UI URL
      # DOCKER_RESTART_WARN: 5              # restart count threshold for warnings
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:80"
    restart: unless-stopped
